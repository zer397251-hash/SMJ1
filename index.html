<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5r...",
  authDomain: "sahkomuseojunat.firebaseapp.com",
  projectId: "sahkomuseojunat",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.onAuthStateChanged = onAuthStateChanged;
window.signOut = signOut;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
</script>

<style>
body { margin:0; font-family: Arial; background:#f5f7fa; }
.topbar { background:white; padding:15px; display:flex; gap:20px; }
.topbar a { cursor:pointer; }
.main { padding:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
button { padding:10px; }
input, textarea { width:100%; padding:8px; margin:5px 0; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="main">
  <div class="card">
    <h2>Kirjaudu</h2>
    <input id="email" placeholder="Sähköposti">
    <input id="password" type="password" placeholder="Salasana">
    <button onclick="login()">Kirjaudu</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="topbar">
    <a onclick="showPage('dashboard')">Etusivu</a>
    <a onclick="showPage('trips')">Junamatkat</a>
    <a onclick="logout()">Kirjaudu ulos</a>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
      <div class="card">
        <h2>Dashboard</h2>
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- TRIPS -->
    <div id="trips" class="page" style="display:none;">
      <div class="card">
        <h2>Junamatkat</h2>

        <input id="tripName" placeholder="Matkan nimi">
        <input id="trainNumber" placeholder="Junan numero">
        <button onclick="addTrip()">Tallenna</button>

        <h3>Matkat</h3>
        <ul id="tripList"></ul>
      </div>
    </div>

  </div>
</div>

<script>
// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadTrips();
  } else {
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

// LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .catch(err => alert(err.message));
}

// LOGOUT
function logout() {
  signOut(auth);
}

// NAV
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(id).style.display = "block";
}

// ADD TRIP
async function addTrip() {
  const name = document.getElementById("tripName").value;
  const train = document.getElementById("trainNumber").value;

  await addDoc(collection(db, "trips"), {
    name: name,
    trainNumber: train,
    createdAt: new Date()
  });

  loadTrips();
}

// LOAD TRIPS
async function loadTrips() {
  const list = document.getElementById("tripList");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "trips"));

  querySnapshot.forEach(doc => {
    const li = document.createElement("li");
    li.innerText = doc.data().name + " (" + doc.data().trainNumber + ")";
    list.appendChild(li);
  });
}

// CHART
const ctx = document.getElementById('chart');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Ma','Ti','Ke','To','Pe'],
    datasets: [{ label:'Liput', data:[5,10,7,12,9] }]
  }
});
</script>

</body>
</html>
