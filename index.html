<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  color: #1e293b;
}

/* TOP NAV */
.topbar {
  background: white;
  padding: 15px 30px;
  display: flex;
  gap: 20px;
  border-bottom: 1px solid #e2e8f0;
}

.topbar a {
  text-decoration: none;
  color: #64748b;
  font-weight: 500;
  cursor: pointer;
}

.topbar a:hover {
  color: black;
}

/* MAIN */
.main {
  padding: 30px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* BUTTON */
button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0 10px 0;
  border-radius: 6px;
  border: 1px solid #cbd5f5;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #e2e8f0;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="topbar">
  <a onclick="showPage('dashboard')">Etusivu</a>
  <a onclick="showPage('trips')">Junamatkat</a>
  <a onclick="showPage('tickets')">Matkaliput</a>
  <a onclick="showPage('fleet')">Kalusto</a>
  <a onclick="showPage('website')">Verkkosivut</a>
  <a onclick="showPage('chat')">Keskustelu</a>
  <a onclick="showPage('issues')">Häiriöt</a>
  <a onclick="showPage('staff')">Henkilöstö</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page">

  <div class="grid">
    <div class="card">
      <h3>Myydyt liput</h3>
      <h1>124</h1>
    </div>

    <div class="card">
      <h3>Tulevat matkat</h3>
      <h1>5</h1>
    </div>

    <div class="card">
      <h3>Kävijät</h3>
      <h1>1024</h1>
    </div>
  </div>

  <div class="card">
    <h3>Lipunmyynti</h3>
    <canvas id="salesChart"></canvas>
  </div>

</div>

<!-- TRIPS -->
<div id="trips" class="page" style="display:none;">
  <div class="card">
    <h2>Junamatkat</h2>

    <button onclick="toggleForm()">+ Luo matka</button>

    <div id="tripForm" style="display:none; margin-top:20px;">
      <input placeholder="Matkan nimi">
      <input placeholder="Junan numero">
      <textarea placeholder="Kuvaus"></textarea>
      <button>Tallenna</button>
    </div>

    <table>
      <tr>
        <th>Nimi</th>
        <th>Juna</th>
        <th>Status</th>
      </tr>
      <tr>
        <td>Esimerkki</td>
        <td>1234</td>
        <td>Draft</td>
      </tr>
    </table>
  </div>
</div>

<!-- MUUT SIVUT -->
<div id="tickets" class="page" style="display:none;"><div class="card"><h2>Matkaliput</h2></div></div>
<div id="fleet" class="page" style="display:none;"><div class="card"><h2>Kalusto</h2></div></div>
<div id="website" class="page" style="display:none;"><div class="card"><h2>Verkkosivut</h2></div></div>
<div id="chat" class="page" style="display:none;"><div class="card"><h2>Keskustelu</h2></div></div>
<div id="issues" class="page" style="display:none;"><div class="card"><h2>Häiriöt</h2></div></div>
<div id="staff" class="page" style="display:none;"><div class="card"><h2>Henkilöstö</h2></div></div>

</div>

<script>
function showPage(pageId) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(pageId).style.display = "block";
}

function toggleForm() {
  const form = document.getElementById("tripForm");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

/* CHART */
const ctx = document.getElementById('salesChart');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Ma', 'Ti', 'Ke', 'To', 'Pe', 'La', 'Su'],
    datasets: [{
      label: 'Liput',
      data: [12, 19, 8, 15, 22, 30, 18]
    }]
  }
});
</script>

</body>
</html>
